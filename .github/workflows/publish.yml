name: Build and Publish

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
  # Auto-publish `next` after a successful CI run on main (continuous delivery
  # of prereleases). Release/tag events still publish `latest`; manual dispatch
  # is unchanged. The build job below gates on the triggering run's conclusion.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  NPM_TAG: ${{ github.event_name == 'release' && 'latest' || 'next' }}

jobs:
  build:
    # For workflow_run triggers, only proceed when the triggering CI run
    # actually succeeded — a `completed` workflow_run can also be a failure,
    # which must not publish.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run fires against the default branch; pin to the exact
          # commit CI validated instead of whatever main points at now.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # keep in sync with package.json packageManager
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages and apps
        run: bun run build

      - name: Sync versions from root package.json
        run: bun scripts/version-sync.ts

      - name: Resolve workspace dependencies
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Resolving workspace:* → ^$VERSION"

          for pkg in packages/core/package.json apps/*/package.json; do
            if grep -q '"workspace:\*"' "$pkg"; then
              sed -i "s|\"workspace:\*\"|\"^$VERSION\"|g" "$pkg"
              echo "  ✓ Resolved in $pkg"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/shared/dist
            packages/shared/package.json
            packages/core/dist
            packages/core/prisma
            packages/core/package.json
            apps/tools-api/dist
            apps/tools-api/package.json
            apps/mcp-client/dist
            apps/mcp-client/package.json
            apps/opencode-plugin/dist
            apps/opencode-plugin/package.json
          retention-days: 1

  publish-packages:
    needs: build
    runs-on: ubuntu-latest
    environment: DEPLOY
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @massa-ai/shared
        working-directory: packages/shared
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @massa-ai/core
        working-directory: packages/core
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apps:
    needs: [build, publish-packages]
    runs-on: ubuntu-latest
    environment: DEPLOY
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @massa-ai/tools-api
        working-directory: apps/tools-api
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @massa-ai/mcp-client
        working-directory: apps/mcp-client
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @massa-ai/opencode-plugin
        working-directory: apps/opencode-plugin
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: build
    # Docker multi-arch builds are heavy and OPTIONAL — npm package publishing
    # is the Publish contract. Skip on the per-push workflow_run (auto `next`)
    # trigger; on release/tag/dispatch, attempt the build but tolerate failure
    # (continue-on-error) so a missing DockerHub credential or image-build
    # issue never fails the Publish run.
    if: github.event_name != 'workflow_run'
    continue-on-error: true
    runs-on: ubuntu-latest
    environment: DEPLOY
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker meta for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: massa/massa-ai
          tags: |
            type=raw,value=api-${{ steps.version.outputs.version }},enable=${{ github.event_name == 'release' }}
            type=raw,value=api-latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=api-new,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Docker meta for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: massa/massa-ai
          tags: |
            type=raw,value=mcp-${{ steps.version.outputs.version }},enable=${{ github.event_name == 'release' }}
            type=raw,value=mcp-latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=mcp-new,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
