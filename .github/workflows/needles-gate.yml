name: Needles Gate

# Chunker / semantic-search regression gate.
#
# Runs the standalone needle-in-haystack harness
# (benchmarks/needles/run.ts) and fails if hit@1 / MRR drop below the floors
# baked into `bench:needles:gate`. This catches silent regressions from
# chunker-default changes, embedding-model swaps, or content shifts that would
# otherwise only surface as a slow quality decay in real usage.
#
# The harness needs an embedding provider (Ollama + qwen3-embedding:8b). To
# keep CI cheap and avoid hard-failing runners that can't reach a model, the
# job is:
#   - path-filtered (only runs when search/chunker/fixture files change, or on
#     manual dispatch), AND
#   - defensive: if Ollama or the model can't be brought up, the job exits 0
#     with a clear "skipped — no embedding provider" message rather than
#     failing the pipeline.
#
# Local equivalent:
#   bun run bench:needles:gate

on:
  push:
    branches: [main]
    paths:
      - "packages/core/src/services/search/smart-chunker.ts"
      - "packages/core/src/services/search/**"
      - "benchmarks/needles/**"
      - ".github/workflows/needles-gate.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/core/src/services/search/smart-chunker.ts"
      - "packages/core/src/services/search/**"
      - "benchmarks/needles/**"
      - ".github/workflows/needles-gate.yml"
  workflow_dispatch: {}

# Let an in-flight gate finish instead of being cancelled by a superseding
# push to the same ref (the historical cause of every "cancelled" run).
concurrency:
  group: needles-${{ github.ref }}
  cancel-in-progress: false

jobs:
  needles:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # keep in sync with package.json packageManager
          bun-version: 1.3.14

      - name: Install dependencies
        # --ignore-scripts: the needles benchmark only imports smartChunk (the
        # text chunker); it does not use the 27 native tree-sitter grammars.
        # Skip their node-gyp builds — fragile on a 2-core runner (the git-dep
        # builds need node-gyp, which isn't reliably resolvable here) and the
        # benchmark doesn't load them anyway.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          # Wait up to 30s for the server to accept connections.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama did not start in 30s"
          cat /tmp/ollama.log || true
          # No embedding provider available — skip gracefully rather than fail.
          echo "::warning::Ollama unavailable; skipping needles gate (no embedding provider)."
          echo "SKIPPED=1" >> "$GITHUB_ENV"
          exit 0

      - name: Cache Ollama model
        if: env.SKIPPED != '1'
        uses: actions/cache@v4
        with:
          # qwen3-embedding:8b is ~5GB; cache its blobs across runs so the
          # `ollama pull` below is a no-op on a warm runner. Bump the -vN
          # suffix when changing the model.
          path: ~/.ollama/models
          key: ollama-model-qwen3-embedding-8b-v1
          restore-keys: ollama-model-qwen3-embedding-8b-

      - name: Pull embedding model
        if: env.SKIPPED != '1'
        run: |
          # Pull the same model the E2E baseline uses. Falls back to
          # nomic-embed-text if qwen3-embedding:8b is unavailable.
          if ollama pull qwen3-embedding:8b 2>/tmp/pull.log; then
            echo "NEEDLE_MODEL=qwen3-embedding:8b" >> "$GITHUB_ENV"
          elif ollama pull nomic-embed-text 2>>/tmp/pull.log; then
            echo "NEEDLE_MODEL=nomic-embed-text" >> "$GITHUB_ENV"
          else
            echo "::warning::Could not pull an embedding model; skipping needles gate."
            cat /tmp/pull.log || true
            echo "SKIPPED=1" >> "$GITHUB_ENV"
          fi

      - name: Run needles gate
        if: env.SKIPPED != '1'
        env:
          NEEDLE_FLOOR_HIT1: "0.5"
          NEEDLE_FLOOR_MRR: "0.65"
        run: bun benchmarks/needles/run.ts --label ci

      - name: Report skip
        if: env.SKIPPED == '1'
        run: echo "::notice::Needles gate skipped — no embedding provider available on this runner."
