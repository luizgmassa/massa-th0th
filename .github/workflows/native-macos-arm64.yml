name: Native macOS arm64

# Frozen native Tree-sitter gate for the macOS arm64 target only.
# Pins the exact application runtime (Bun 1.3.11) and the exact node-gyp
# build helper (Node 25.9.0 / npm 11.14.1), then proves source, built dist,
# and the packed package load, parse, and dispose every required grammar with
# Mach-O arm64/system-only linkage. This workflow is additive: it does not
# alter any pre-existing workflow, platform job, or container path.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-macos-arm64:
    name: Verify native Tree-sitter artifacts (darwin-arm64)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun 1.3.11
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node 25.9.0 (node-gyp build helper)
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Verify exact runtime and build helper
        run: |
          echo "bun=$(bun --version)"
          echo "node=$(node --version)"
          echo "npm=$(npm --version)"
          test "$(bun --version)" = "1.3.11"
          test "$(node --version)" = "v25.9.0"
          test "$(npm --version)" = "11.14.1"

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Verify native Tree-sitter artifacts (source/dist + packed package)
        run: |
          set -o pipefail
          bun run verify:tree-sitter-native 2>&1 | tee native-macos-arm64-verification.log

      - name: Upload native verification provenance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64-verification
          path: native-macos-arm64-verification.log
          if-no-files-found: error
