name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://massa_th0th:massa_th0th_password@localhost:5432/massa_th0th

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: massa_th0th
          POSTGRES_PASSWORD: massa_th0th_password
          POSTGRES_DB: massa_th0th
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U massa_th0th"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # keep in sync with package.json packageManager
          bun-version: 1.3.14

      # Project's pinned Node (.node-version, currently 25.9) as the node-gyp
      # build helper for the native tree-sitter N-API addons. Ubuntu/gcc compiles
      # Node 25 V8 headers cleanly — unlike macos-14's Apple clang, which is why
      # the structural-native job stays on Node 22 (see comment there). Without
      # an explicit node, bun's install scripts intermittently fail: "could not
      # determine executable to run for package node-gyp" -> tree-sitter-*
      # install exits 1.
      - name: Setup Node (node-gyp build helper)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Prisma migrations
        run: cd packages/core && bunx prisma migrate deploy

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Detect grammar-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            grammar:
              - 'packages/core/src/services/structural/**'
              - 'packages/core/prisma/migrations/**'
              - 'scripts/verify-tree-sitter*.ts'
            changelog:
              - 'CHANGELOG.md'

      - name: Grammar integrity verifier
        if: steps.filter.outputs.grammar == 'true'
        run: bun run verify:tree-sitter-native

      - name: CHANGELOG merge gate
        if: github.event_name == 'pull_request' && steps.filter.outputs.changelog == 'false' && !contains(github.event.pull_request.labels.*.name, 'no-changelog') && github.event.pull_request.user.type != 'Bot'
        run: |
          echo "❌ CHANGELOG.md not modified. Add an entry under [Unreleased] or apply the 'no-changelog' label."
          echo "Bot-authored PRs (Dependabot, etc.) are exempt."
          exit 1

      - name: Test
        run: bun run test
        env:
          MASSA_TH0TH_EXECUTOR_SANDBOX: none

  mcp:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: massa_th0th
          POSTGRES_PASSWORD: massa_th0th_password
          POSTGRES_DB: massa_th0th
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: massa-th0th-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: false
          load: true
          tags: massa-th0th-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start API container
        run: |
          docker run -d --name massa-th0th-api \
            --network host \
            -e DATABASE_URL="postgresql://massa_th0th:massa_th0th_password@localhost:5432/massa_th0th" \
            -e NODE_ENV=test \
            -p 3333:3333 \
            massa-th0th-api:test

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3333/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in 20s"
          docker logs massa-th0th-api
          exit 1

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:3333/health | jq -r '.status')
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Verify Swagger docs
        run: curl -sf http://localhost:3333/swagger | head -1

      - name: Cleanup
        if: always()
        run: docker rm -f massa-th0th-api 2>/dev/null || true

  structural-native:
    name: Structural native tests (darwin-arm64)
    # Native Tree-sitter grammars are built/loaded only on macOS arm64
    # and Linux glibc x64 (grammar-loaders.ts assertRuntimeTarget). The
    # structural-* suites are skipped on other platforms via describeNative
    # in the tests; this job runs them for real on macOS. Replaces the
    # former .github/workflows/native-macos-arm64.yml.
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun 1.3.14
        uses: oven-sh/setup-bun@v2
        with:
          # keep in sync with package.json packageManager
          bun-version: 1.3.14

      # tree-sitter's N-API addon compiles via node-gyp during `bun install`.
      # Pin Node 22 LTS: its V8 headers compile cleanly under the macos-14
      # Apple clang. Node 25 V8 headers use a braced-init-list template arg
      # (`ReadExternalPointerField<{...}>`) that macos-14's clang rejects
      # ("error: expected expression"), breaking the native build. The addon
      # is N-API (ABI-stable), so the Node major is irrelevant to runtime
      # loading under Bun — 22 is purely the build-helper toolchain here.
      - name: Setup Node 22 LTS (node-gyp build helper)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Run native-structural unit tests
        working-directory: packages/core
        run: bun scripts/run-tests-isolated.ts --unit --filter='structural|parse-long-class'

  structural-native-linux:
    name: Structural native tests (linux-x64)
    # M21: Linux glibc x64 native structural runtime. Parallel to the
    # macOS arm64 job above. Native Tree-sitter grammars build via node-gyp
    # under Node 25.9.0 (C++20 binding.gyp) or Node 22 LTS fallback if the
    # Linux toolchain rejects Node 25 headers (same braced-init-list issue
    # as macos-14). The addon is N-API (ABI-stable), so runtime loading
    # under Bun 1.3.14 is unaffected by the build-helper Node major.
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun 1.3.14
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node 25.9.0 (node-gyp build helper)
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'

      - name: Reconcile npm to contract version (11.14.1)
        run: npm install -g npm@11.14.1

      - name: Install dependencies (build native addon from source)
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Run native verifier (source/dist + packed package)
        run: bun run verify:tree-sitter-native | tee native-linux-x64-verification.log

      - name: Run native-structural unit tests
        working-directory: packages/core
        run: bun scripts/run-tests-isolated.ts --unit --filter='structural|parse-long-class'

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64-verification.log
          path: native-linux-x64-verification.log
          if-no-files-found: error
