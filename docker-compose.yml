# ============================================
# massa-th0th - Docker Compose
# ============================================
# Services:
#   postgres - PostgreSQL database (port 5432)
#   api      - REST API (port 3333)
#   mcp      - MCP stdio client (connects to api)
#
# Usage:
#   docker compose up -d postgres       # PostgreSQL only
#   docker compose up -d api            # API + PostgreSQL
#   docker compose up -d                # All services
#   docker compose logs -f              # Watch logs
#
# MCP via Docker (Claude Desktop / OpenCode):
#   docker compose run --rm -i mcp
#
# Build locally instead of pulling from DockerHub:
#   docker compose up -d --build
# ============================================

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: massa-th0th-postgres
    restart: unless-stopped
    ports:
      - "${MASSA_TH0TH_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: massa_th0th
      # Set POSTGRES_PASSWORD in .env before production deploys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-massa_th0th_password}
      POSTGRES_DB: massa_th0th
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U massa_th0th"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${MASSA_TH0TH_API_IMAGE:-massa/massa-th0th:api-latest}
    container_name: massa-th0th-api
    restart: unless-stopped
    ports:
      - "${MASSA_TH0TH_API_PORT:-3333}:3333"
    volumes:
      - massa-th0th-data:/data
    environment:
      - NODE_ENV=production
      - MASSA_TH0TH_API_PORT=3333
      - DATABASE_URL=postgresql://massa_th0th:${POSTGRES_PASSWORD:-massa_th0th_password}@postgres:5432/massa_th0th
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:8b}
      - OLLAMA_EMBEDDING_DIMENSIONS=${OLLAMA_EMBEDDING_DIMENSIONS:-4096}
      - RLM_LLM_ENABLED=${RLM_LLM_ENABLED:-false}
      - RLM_LLM_API_KEY=${RLM_LLM_API_KEY:-}
      - RLM_LLM_MODEL=${RLM_LLM_MODEL:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3333/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  mcp:
    image: ${MASSA_TH0TH_MCP_IMAGE:-massa/massa-th0th:mcp-latest}
    container_name: massa-th0th-mcp
    stdin_open: true
    environment:
      - NODE_ENV=production
      - MASSA_TH0TH_API_URL=http://api:3333
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  massa-th0th-data:
    driver: local
